<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Professor Gunner's Schoolhouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      min-height: 100dvh;
      background: #5BA3D9;
      font-family: "Press Start 2P", ui-monospace, monospace;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 40px;
      position: relative;
    }
    .atorgames-brand {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 40;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 200ms ease;
      line-height: 1.4;
    }
    .atorgames-brand:hover { opacity: 1; }
    .atorgames-name {
      display: block;
      font-size: 10px;
      color: #FFE066;
    }
    .atorgames-com {
      display: block;
      font-size: 7px;
      color: #fff;
      margin-top: 4px;
    }
    h1 {
      font-size: clamp(12px, 3.5vw, 16px);
      color: #FFE066;
      text-align: center;
      line-height: 1.8;
      max-width: 520px;
    }
    p {
      margin-top: 32px;
      font-size: 8px;
      color: rgba(0, 0, 0, 0.45);
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="atorgames-brand" onclick="goHome()" role="link" tabindex="0" aria-label="AtorGames home" onkeydown="if(event.key==='Enter'||event.key===' ')goHome()">
    <span class="atorgames-name">AtorGames</span>
    <span class="atorgames-com">.com</span>
  </div>
  <h1>PROFESSOR GUNNER'S<br>SCHOOLHOUSE</h1>
  <p>Curriculum loading…</p>
  <script>
  function goHome() {
    var o = document.createElement('div');
    o.setAttribute('aria-hidden', 'true');
    o.style.cssText = 'position:fixed;inset:0;background:#000;opacity:0;z-index:100000;transition:opacity 500ms ease;pointer-events:none';
    document.body.appendChild(o);
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        o.style.opacity = '1';
        o.style.pointerEvents = 'auto';
      });
    });
    setTimeout(function () { window.location.href = '/'; }, 500);
  }
  </script>
</body>
</html>
