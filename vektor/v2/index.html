<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rally — Vektor · V2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: #0f0d08;
      font-family: Georgia, "Times New Roman", serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 12px 20px;
      position: relative;
      transition: background 0.2s ease;
    }
    .hub-back {
      position: absolute;
      top: 20px;
      left: 24px;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #3a3025;
      text-transform: uppercase;
      text-decoration: none;
      font-family: system-ui, sans-serif;
      transition: color 150ms ease;
      z-index: 25;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }
    @media (hover: hover) and (pointer: fine) {
      .hub-back:hover { color: #c8a96e; }
    }
    .top-bar.hidden { visibility: hidden; }
    .diff-hud {
      margin-top: 6px;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: #3a3025;
      text-transform: uppercase;
      text-align: center;
      font-family: system-ui, sans-serif;
      width: min(600px, 96vw);
    }
    .top-bar {
      width: min(600px, 96vw);
      max-width: 600px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-family: system-ui, sans-serif;
    }
    .scheme-name {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding-top: 4px;
      flex-shrink: 0;
    }
    .score-block { flex: 1; text-align: center; }
    .score-row {
      display: flex;
      justify-content: space-between;
      width: 100%;
    }
    .score-side { text-align: center; flex: 1; }
    .score-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #6b5c3e;
      text-transform: uppercase;
    }
    .score-num {
      font-family: Georgia, serif;
      font-size: 32px;
      line-height: 1.1;
    }
    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 6px;
    }
    .dots.cpu { margin-top: 4px; }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      box-sizing: border-box;
    }
    .pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      width: min(600px, 96vw);
      max-width: 600px;
      margin: 12px 0 8px;
      font-family: system-ui, sans-serif;
    }
    .pills.hide-narrow { display: none; }
    .pill-mobi {
      display: none;
      width: min(600px, 96vw);
      max-width: 600px;
      margin: 12px 0 8px;
      font-family: system-ui, sans-serif;
    }
    .pill-mobi.show { display: flex; }
    .pill-mobi-inner {
      display: flex;
      width: 100%;
      align-items: stretch;
      min-height: 44px;
    }
    .pill-nav {
      flex: 0 0 48px;
      min-width: 48px;
      border: 1px solid rgba(200, 169, 110, 0.4);
      background: transparent;
      color: #c8a96e;
      font-size: 14px;
      cursor: pointer;
      font-family: system-ui, sans-serif;
    }
    .pill-nav:active { opacity: 0.8; }
    .pill-mobi-label {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-top: 1px solid rgba(200, 169, 110, 0.4);
      border-bottom: 1px solid rgba(200, 169, 110, 0.4);
    }
    .pill {
      border: 1px solid rgba(200, 169, 110, 0.4);
      background: transparent;
      color: #6b5c3e;
      padding: 6px 10px;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      transition: background 0.15s, color 0.15s;
      min-height: 32px;
    }
    @media (min-width: 481px) {
      .pill { min-height: 28px; }
    }
    .pill.active {
      background: rgba(200, 169, 110, 0.15);
      color: #c8a96e;
    }
    .canvas-wrap {
      position: relative;
      width: min(600px, 96vw);
      max-width: 600px;
    }
    .scanlines {
      pointer-events: none;
      position: absolute;
      inset: 0;
      z-index: 1;
      border-radius: 0;
    }
    canvas {
      display: block;
      position: relative;
      z-index: 0;
      width: min(600px, 96vw);
      height: auto;
      aspect-ratio: 600 / 400;
    }
    canvas.can-tap { cursor: pointer; }
    .win-layer {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 5;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(15, 13, 8, 0.92);
      padding: 24px;
      text-align: center;
    }
    .win-layer.on { display: flex; }
    .win-layer .wm {
      font-family: Georgia, serif;
      font-size: 28px;
      letter-spacing: 0.3em;
      text-indent: 0.3em;
      margin-bottom: 16px;
    }
    .win-layer .res {
      font-family: Georgia, serif;
      font-size: 20px;
      letter-spacing: 0.1em;
      margin-bottom: 28px;
    }
    .btn-play {
      border: 1px solid #c8a96e;
      color: #c8a96e;
      padding: 8px 20px;
      font-size: 10px;
      letter-spacing: 0.15em;
      background: transparent;
      cursor: pointer;
      text-transform: uppercase;
      font-family: system-ui, sans-serif;
      transition: background 200ms ease;
      min-height: 44px;
      min-width: 120px;
    }
    @media (hover: hover) and (pointer: fine) {
      .btn-play:hover { background: rgba(200, 169, 110, 0.1); }
    }
    .status {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #5a4d35;
      text-transform: uppercase;
      text-align: center;
      font-family: system-ui, sans-serif;
      width: min(600px, 96vw);
    }
    .hint {
      margin-top: 6px;
      font-size: 10px;
      color: #3a3025;
      letter-spacing: 0.06em;
      text-align: center;
      font-family: system-ui, sans-serif;
      width: min(600px, 96vw);
    }
    .touch-bar {
      display: none;
      width: 100vw;
      max-width: 100%;
      margin-top: 0;
      border-top: 1px solid #2a2318;
      height: 100px;
      min-height: 100px;
    }
    .touch-bar.show { display: flex; }
    .touch-split { display: flex; width: 100%; height: 100%; align-items: stretch; }
    .touch-side-btn {
      flex: 1;
      min-width: 0;
      min-height: 100px;
      background: rgba(200, 169, 110, 0.06);
      border: none;
      border-right: 1px solid #2a2318;
      color: #c8a96e;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: system-ui, sans-serif;
    }
    .touch-side-btn:active { background: rgba(200, 169, 110, 0.18); }
    .touch-pause-wrap { flex: 1; display: flex; min-width: 0; border-right: 1px solid #2a2318; }
    .touch-pause-wrap button {
      flex: 1;
      width: 100%;
      height: 100%;
      min-height: 100px;
      background: rgba(200, 169, 110, 0.06);
      border: none;
      color: #c8a96e;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: system-ui, sans-serif;
    }
    .touch-pause-wrap button:active { background: rgba(200, 169, 110, 0.18); }
    body.touch-ui #btnAgain { display: none !important; }
    @media (max-width: 480px) {
      .pills { display: none !important; }
      .pill-mobi.show { display: flex; }
    }
    @media (min-width: 481px) {
      .pill-mobi { display: none !important; }
    }
    .sound-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: rgba(255, 248, 230, 0.92);
      text-transform: uppercase;
      font-family: system-ui, sans-serif;
      transition: background 200ms ease, border-color 200ms ease, color 200ms ease;
      z-index: 20;
      min-height: 44px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 3px;
      background: rgba(0, 0, 0, 0.35);
      cursor: pointer;
      box-sizing: border-box;
    }
    .sound-toggle[aria-pressed="false"] {
      color: rgba(255, 255, 255, 0.45);
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(0, 0, 0, 0.2);
    }
    @media (hover: hover) and (pointer: fine) {
      .sound-toggle:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.48);
      }
    }
    .atorgames-brand {
      position: absolute;
      top: 18px;
      left: 20px;
      z-index: 40;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 200ms ease;
      line-height: 1.15;
    }
    .atorgames-brand:hover { opacity: 1; }
    .atorgames-name { display: block; font-family: Georgia, "Times New Roman", serif; font-size: 13px; color: #c8a96e; }
    .atorgames-com { display: block; font-family: Georgia, "Times New Roman", serif; font-size: 9px; color: #6b5c3e; margin-top: 2px; }
    .hub-back { left: 118px; }
  </style>
</head>
<body>
  <div class="atorgames-brand" onclick="goHome()" role="link" tabindex="0" aria-label="AtorGames home" onkeydown="if(event.key==='Enter'||event.key===' ')goHome()">
    <span class="atorgames-name">AtorGames</span>
    <span class="atorgames-com">.com</span>
  </div>
  <a class="hub-back" href="/vektor/">← vektor</a>
  <button type="button" class="sound-toggle" id="soundToggle" aria-pressed="true" aria-label="Toggle game sound">Sound on</button>
  <div class="top-bar hidden" id="topBar">
    <div class="scheme-name" id="schemeLabel">VEKTOR</div>
    <div class="score-block">
      <div class="score-row">
        <div class="score-side">
          <div class="score-label">You</div>
          <div class="score-num" id="scoreP">0</div>
          <div class="dots" id="dotsP"></div>
        </div>
        <div class="score-side">
          <div class="score-label">CPU</div>
          <div class="score-num" id="scoreC">0</div>
          <div class="dots cpu" id="dotsC"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <div class="scanlines" id="scanlines" style="display:none;"></div>
    <canvas id="c" width="600" height="400"></canvas>
    <div class="win-layer" id="winLayer">
      <div class="wm" id="winWm">V E K T O R</div>
      <div class="res" id="winRes"></div>
      <button type="button" class="btn-play" id="btnAgain">Play again</button>
    </div>
  </div>
  <p class="status" id="status"></p>
  <p class="hint" id="hintDesk">← → OR A D · SPACE PAUSE · T NEXT SCHEME</p>
  <p class="diff-hud" id="diffHud">Pilot</p>
  <div class="pills" id="pills"></div>
  <div class="pill-mobi" id="pillMobi">
    <div class="pill-mobi-inner">
      <button type="button" class="pill-nav" id="pillPrev" aria-label="Previous scheme">◀</button>
      <div class="pill-mobi-label" id="pillMobiName">VEKTOR</div>
      <button type="button" class="pill-nav" id="pillNext" aria-label="Next scheme">▶</button>
    </div>
  </div>
  <div class="touch-bar" id="touchBar">
    <div class="touch-split">
      <button type="button" class="touch-side-btn" id="touchL" aria-label="Move left">Left</button>
      <div class="touch-pause-wrap">
        <button type="button" id="touchPause" aria-label="Start or pause">Start</button>
      </div>
      <button type="button" class="touch-side-btn" id="touchR" aria-label="Move right">Right</button>
    </div>
  </div>
  <script>
(function () {
  const W = 600, H = 400;
  const PADDLE_W = 80, PADDLE_H = 10;
  const BALL_R = 7;
  const PLAYER_SPEED = 7;
  const TRAIL_LEN = 16;
  const POINTS_TO_WIN_GAME = 7;
  const GAMES_TO_WIN_MATCH = 3;
  const FRAME_MS = 1000 / 60;
  const DIFF_KEY = 'vektor-difficulty';
  const DIFFICULTY = {
    CADET: { cpuSpeed: 2.2, cpuError: 0.35, ballSpeed: 3.8, ballSpeedMax: 7.0, ballSpeedIncrement: 0.10 },
    PILOT: { cpuSpeed: 3.2, cpuError: 0.18, ballSpeed: 4.5, ballSpeedMax: 9.0, ballSpeedIncrement: 0.15 },
    ACE: { cpuSpeed: 4.8, cpuError: 0.06, ballSpeed: 5.5, ballSpeedMax: 11.0, ballSpeedIncrement: 0.22 }
  };
  const DIFF_NAMES = ['CADET', 'PILOT', 'ACE'];
  function loadDiffKey() {
    const k = localStorage.getItem(DIFF_KEY);
    if (k === 'CADET' || k === 'PILOT' || k === 'ACE') return k;
    return 'PILOT';
  }
  let diffKey = loadDiffKey();
  function diff() { return DIFFICULTY[diffKey]; }
  function speedMin() { return diff().ballSpeed; }
  function speedMax() { return diff().ballSpeedMax; }

  function hexToRgb(hex) {
    const n = parseInt(hex.replace('#', ''), 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }
  function rgbaStr(hex, a) {
    const { r, g, b } = hexToRgb(hex);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }
  function colorWithAlpha(color, a) {
    if (!color) return 'rgba(200,169,110,' + a + ')';
    if (color.startsWith('hsl')) {
      return color.replace(/^hsl\(/, 'hsla(').replace(/\)$/, ', ' + a + ')');
    }
    if (color.startsWith('#')) return rgbaStr(color, a);
    return color;
  }
  function lerpColor(hexA, hexB, t) {
    const a = hexToRgb(hexA), b = hexToRgb(hexB);
    const r = Math.round(a.r + (b.r - a.r) * t);
    const g = Math.round(a.g + (b.g - a.g) * t);
    const bl = Math.round(a.b + (b.b - a.b) * t);
    return 'rgb(' + r + ',' + g + ',' + bl + ')';
  }
  const SCHEMES = [
    { id: 'vektor', name: 'VEKTOR', disco: false, bg: '#0f0d08', player: '#c8a96e', cpu: '#7a6040', ball: '#c8a96e', trailA: '#c8a96e', trailB: '#8b4513', text: '#c8a96e', scan: null },
    { id: 'glow', name: 'GLOW', disco: false, bg: '#050510', player: '#00ffff', cpu: '#0066aa', ball: '#ffffff', trailA: '#ffffff', trailB: '#00ffff', text: '#00ffff', scan: null },
    { id: 'disco', name: 'DISCO', disco: true, bg: '#0a0010', player: null, cpu: null, ball: null, trailA: null, trailB: null, text: null, scan: null },
    { id: 'edm', name: 'EDM', disco: false, bg: '#000008', player: '#ff00ff', cpu: '#7700aa', ball: '#ff00ff', trailA: '#ff00ff', trailB: '#0044ff', text: '#ff00ff', scan: { px: 3, rgb: '51,0,51', op: 0.08 } },
    { id: 'midnight', name: 'MIDNIGHT', disco: false, bg: '#080810', player: '#4488ff', cpu: '#224488', ball: '#88aaff', trailA: '#88aaff', trailB: '#220044', text: '#4488ff', scan: null },
    { id: 'infrared', name: 'INFRARED', disco: false, bg: '#0d0000', player: '#ff3300', cpu: '#660000', ball: '#ff6600', trailA: '#ff6600', trailB: '#1a0000', text: '#ff3300', scan: null },
    { id: 'matrix', name: 'MATRIX', disco: false, bg: '#000a00', player: '#00ff41', cpu: '#003300', ball: '#00ff41', trailA: '#00ff41', trailB: '#003300', text: '#00ff41', scan: { px: 2, rgb: '0,34,0', op: 0.06 } }
  ];

  let schemeIndex = 0;
  function scheme() { return SCHEMES[schemeIndex]; }

  function discoHue(now, periodMs, offset) {
    return ((now / periodMs * 360) + offset) % 360;
  }
  function discoColors(now) {
    const hp = discoHue(now, 2000, 0);
    const hc = (hp + 180) % 360;
    const hb = discoHue(now, 3000, 40);
    return {
      player: 'hsl(' + hp + ',75%,55%)',
      cpu: 'hsl(' + hc + ',75%,40%)',
      ball: 'hsl(' + hb + ',85%,60%)',
      text: 'hsl(' + hb + ',85%,60%)',
      trailHueBase: hb
    };
  }

  function resolveSchemeColors(now) {
    const s = scheme();
    if (s.disco) {
      const d = discoColors(now);
      return {
        bg: s.bg, player: d.player, cpu: d.cpu, ball: d.ball, trailA: d.ball, trailB: 'hsl(' + ((d.trailHueBase + 120) % 360) + ',70%,40%)',
        text: d.text, scan: null, disco: true, trailHueBase: d.trailHueBase
      };
    }
    return {
      bg: s.bg, player: s.player, cpu: s.cpu, ball: s.ball, trailA: s.trailA, trailB: s.trailB, text: s.text, scan: s.scan, disco: false
    };
  }

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const elP = document.getElementById('scoreP');
  const elC = document.getElementById('scoreC');
  const elStatus = document.getElementById('status');
  const hintDesk = document.getElementById('hintDesk');
  const touchBar = document.getElementById('touchBar');
  const touchPause = document.getElementById('touchPause');
  const topBar = document.getElementById('topBar');
  const diffHud = document.getElementById('diffHud');
  const touchL = document.getElementById('touchL');
  const touchR = document.getElementById('touchR');
  const scanEl = document.getElementById('scanlines');
  const pillsEl = document.getElementById('pills');
  const schemeLabel = document.getElementById('schemeLabel');
  const dotsP = document.getElementById('dotsP');
  const dotsC = document.getElementById('dotsC');
  const winLayer = document.getElementById('winLayer');
  const winWm = document.getElementById('winWm');
  const winRes = document.getElementById('winRes');
  const btnAgain = document.getElementById('btnAgain');
  const pillMobi = document.getElementById('pillMobi');
  const pillMobiName = document.getElementById('pillMobiName');
  const pillPrev = document.getElementById('pillPrev');
  const pillNext = document.getElementById('pillNext');
  const canvasWrap = document.getElementById('canvasWrap');

  const isTouchUI = 'ontouchstart' in window || (window.matchMedia && matchMedia('(pointer: coarse)').matches);
  const isNarrow = window.matchMedia && matchMedia('(max-width: 480px)').matches;
  if (isTouchUI) {
    touchBar.classList.add('show');
    hintDesk.style.display = 'none';
    canvas.classList.add('can-tap');
  }
  function syncDiffHud() {
    diffHud.textContent = diffKey.charAt(0) + diffKey.slice(1).toLowerCase();
  }
  syncDiffHud();
  if (isNarrow) pillMobi.classList.add('show');

  function buildDots() {
    dotsP.innerHTML = '';
    dotsC.innerHTML = '';
    for (let i = 0; i < 5; i++) {
      const d1 = document.createElement('span');
      d1.className = 'dot';
      dotsP.appendChild(d1);
      const d2 = document.createElement('span');
      d2.className = 'dot';
      dotsC.appendChild(d2);
    }
  }
  buildDots();

  function buildPills() {
    pillsEl.innerHTML = '';
    SCHEMES.forEach((s, i) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'pill';
      b.textContent = s.name;
      b.dataset.idx = String(i);
      b.addEventListener('click', () => { setScheme(i); });
      pillsEl.appendChild(b);
    });
  }
  buildPills();

  function setScheme(i) {
    schemeIndex = (i + SCHEMES.length) % SCHEMES.length;
    const s = scheme();
    const col = resolveSchemeColors(performance.now());
    document.body.style.background = col.bg;
    schemeLabel.textContent = s.name;
    schemeLabel.style.color = col.text;
    elP.style.color = col.text;
    elC.style.color = col.text;
    updatePillStyles(col.text);
    updateScanlines(col);
    pillMobiName.textContent = s.name;
    pillMobiName.style.color = col.text;
    const borderC = colorWithAlpha(col.text, 0.4);
    pillPrev.style.borderColor = borderC;
    pillNext.style.borderColor = borderC;
    pillMobiName.style.borderColor = borderC;
    updateMatchDots(col.text);
  }

  function updatePillStyles(textColor) {
    const pills = pillsEl.querySelectorAll('.pill');
    pills.forEach((p, i) => {
      const active = i === schemeIndex;
      const border = colorWithAlpha(textColor, 0.4);
      p.style.borderColor = border;
      p.style.color = active ? textColor : '#6b5c3e';
      p.style.background = active ? colorWithAlpha(textColor, 0.15) : 'transparent';
      p.classList.toggle('active', active);
    });
  }

  function updateScanlines(col) {
    if (col.scan) {
      scanEl.style.display = 'block';
      const n = col.scan.px;
      const g = col.scan.rgb;
      const o = col.scan.op;
      scanEl.style.background = 'repeating-linear-gradient(to bottom, transparent, transparent ' + n + 'px, rgba(' + g + ',' + o + ') ' + n + 'px, rgba(' + g + ',' + o + ') calc(' + n + 'px + 1px))';
    } else {
      scanEl.style.display = 'none';
      scanEl.style.background = 'none';
    }
  }

  pillPrev.addEventListener('click', () => setScheme(schemeIndex - 1));
  pillNext.addEventListener('click', () => setScheme(schemeIndex + 1));
  pillMobiName.addEventListener('click', () => setScheme(schemeIndex + 1));

  const SOUND_KEY = 'vektor-v2-sound';
  let soundEnabled = localStorage.getItem(SOUND_KEY) !== '0';
  const soundToggle = document.getElementById('soundToggle');
  function syncSoundUi() {
    soundToggle.textContent = soundEnabled ? 'Sound on' : 'Sound off';
    soundToggle.setAttribute('aria-pressed', soundEnabled ? 'true' : 'false');
  }
  syncSoundUi();
  var lastSoundPtrToggleV2 = 0;
  function toggleSoundPrefV2() {
    soundEnabled = !soundEnabled;
    localStorage.setItem(SOUND_KEY, soundEnabled ? '1' : '0');
    syncSoundUi();

  let gameP = 0, gameC = 0;
  let matchP = 0, matchC = 0;
  let running = false;
  let paused = false;
  let postScoreUntil = 0;
  let nextServeToPlayer = true;
  let matchOver = false;
  let phase = 'idle';
  let ballSpeed = speedMin();
  let diffHitRects = [];
  let pulseMs = 0;
  let flashPMs = 0, flashCMs = 0;

  const player = { x: W / 2 - PADDLE_W / 2, y: H - 24 - PADDLE_H };

  const ball = { x: W / 2, y: H / 2, vx: 0, vy: 0 };
  const trail = [];
  const keys = { left: false, right: false };

  function cpuSpeedNow() {

  }

  function resetMatch() {

    matchOver = false;

    paused = false;

    postScoreUntil = 0;

  function updateMatchDots(textColor) {
    const kidsP = dotsP.children;

    const t = textColor != null ? textColor : resolveSchemeColors(performance.now()).text;
    const bd = colorWithAlpha(t, 0.5);

  function resetBall(serveTowardPlayer) {

    ball.y = H / 2;

    const dir = serveTowardPlayer ? 1 : -1;
    ball.vx = Math.sin(angle) * ballSpeed * (Math.random() < 0.5 ? -1 : 1);
    ball.vy = Math.cos(angle) * ballSpeed * dir;

  function canvasToLogical(clientX, clientY) {

  function hitDiff(px, py) {

  function clampPaddle(px) {
    return Math.max(0, Math.min(W - PADDLE_W, px));

  function hitPlayer() {
    if (ball.vy <= 0) return false;
    const py = player.y;
    if (ball.y + BALL_R < py) return false;
    if (ball.y + BALL_R > py + PADDLE_H + BALL_R) return false;
    if (ball.x < player.x - BALL_R || ball.x > player.x + PADDLE_W + BALL_R) return false;
    return true;
  }

  function hitCpu() {
    if (ball.vy >= 0) return false;
    const cy = cpu.y;
    if (ball.y - BALL_R > cy + PADDLE_H) return false;
    if (ball.y - BALL_R < cy - BALL_R) return false;
    if (ball.x < cpu.x - BALL_R || ball.x > cpu.x + PADDLE_W + BALL_R) return false;
    return true;
  }

  function applyPaddleBounce(isPlayer) {
    const paddle = isPlayer ? player : cpu;
    const pc = paddle.x + PADDLE_W / 2;
    let relative = (ball.x - pc) / (PADDLE_W / 2);
    relative = Math.max(-1, Math.min(1, relative));
    const maxAng = Math.PI * 0.35;
    const angle = relative * maxAng;
    ballSpeed = Math.min(speedMax(), ballSpeed + diff().ballSpeedIncrement);
    if (isPlayer) {
      ball.vx = Math.sin(angle) * ballSpeed;
      ball.vy = -Math.abs(Math.cos(angle) * ballSpeed);
    } else {
      ball.vx = Math.sin(angle) * ballSpeed;
      ball.vy = Math.abs(Math.cos(angle) * ballSpeed);
    }
    const mag = Math.hypot(ball.vx, ball.vy) || 1;
    ball.vx = (ball.vx / mag) * ballSpeed;
    ball.vy = (ball.vy / mag) * ballSpeed;

      ball.y = player.y - BALL_R;
      sndPlayerHit();
      flashPMs = 150;
    } else {
      ball.y = cpu.y + PADDLE_H + BALL_R;
      sndCpuHit();
      flashCMs = 150;
    }
    pulseMs = 200;
  }

  function endMatch(playerWon) {
    ensureAudio();
    matchOver = true;
    running = false;
    paused = false;
    ball.vx = ball.vy = 0;
    ball.x = W / 2;
    ball.y = H / 2;
    const col = resolveSchemeColors(performance.now());
    const bg = hexToRgb(col.bg);

    winLayer.classList.add('on');

    winWm.style.color = col.text;
    winRes.style.color = col.text;

      ? 'YOU WIN  ' + matchP + ' — ' + matchC

    btnAgain.style.color = col.text;

  function awardGamePoint(cpuPoint) {
    if (cpuPoint) gameC++;
    else gameP++;

    elC.textContent = gameC;
    if (gameP >= POINTS_TO_WIN_GAME) {
      matchP++;
      gameP = gameC = 0;
      elP.textContent = '0';
      elC.textContent = '0';
      ballSpeed = speedMin();
      updateMatchDots(resolveSchemeColors(performance.now()).text);
      if (matchP >= GAMES_TO_WIN_MATCH) endMatch(true);
    } else if (gameC >= POINTS_TO_WIN_GAME) {
      matchC++;
      gameP = gameC = 0;
      elP.textContent = '0';
      elC.textContent = '0';
      ballSpeed = speedMin();
      updateMatchDots(resolveSchemeColors(performance.now()).text);
      if (matchC >= GAMES_TO_WIN_MATCH) endMatch(false);

  }

  let lastNow = 0;
  let lastDotsHueUpdate = 0;
  function tick(now) {

    const dtMs = lastNow ? Math.min(64, now - lastNow) : FRAME_MS;

    const f = dtMs / FRAME_MS;
    if (pulseMs > 0) pulseMs = Math.max(0, pulseMs - dtMs);
    if (flashPMs > 0) flashPMs = Math.max(0, flashPMs - dtMs);
    if (flashCMs > 0) flashCMs = Math.max(0, flashCMs - dtMs);

    const col = resolveSchemeColors(now);
    if (col.disco) {
      schemeLabel.style.color = col.text;
      elP.style.color = col.text;
      elC.style.color = col.text;
      pillMobiName.style.color = col.text;
      if (!lastDotsHueUpdate || now - lastDotsHueUpdate > 80) {
        lastDotsHueUpdate = now;
        updateMatchDots(col.text);
      }
    }

    if (phase === 'idle' && !matchOver) {
      drawIdleScreen(now);
      return;
    }

    ctx.fillStyle = col.bg;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = col.text;
    ctx.globalAlpha = 0.4;
    ctx.font = '13px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.letterSpacing = '0.3em';
    ctx.fillText('V E K T O R', W / 2, 7);
    ctx.letterSpacing = '0';
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';

    ctx.strokeStyle = '#1e1a12';
    if (col.disco) {
      ctx.strokeStyle = 'rgba(100,80,120,0.25)';
    }
    ctx.setLineDash([6, 8]);
    ctx.beginPath();
    ctx.moveTo(0, H / 2);
    ctx.lineTo(W, H / 2);
    ctx.stroke();
    ctx.setLineDash([]);

    const extraR = pulseMs > 0 ? 2 * (pulseMs / 200) : 0;
    const drawR = BALL_R + extraR;

    if (running && !paused && !matchOver && now >= postScoreUntil) {
      if (keys.left) player.x = clampPaddle(player.x - PLAYER_SPEED * f);
      if (keys.right) player.x = clampPaddle(player.x + PLAYER_SPEED * f);

      const csp = cpuSpeedNow();
      const errOff = (Math.random() - 0.5) * PADDLE_W * diff().cpuError;
      const target = ball.x + ball.vx * 8 + errOff;
      const cx = cpu.x + PADDLE_W / 2;
      if (target < cx - 2) cpu.x = clampPaddle(cpu.x - csp * f);
      else if (target > cx + 2) cpu.x = clampPaddle(cpu.x + csp * f);

      ball.x += ball.vx * f;
      ball.y += ball.vy * f;

      if (ball.x - BALL_R <= 0) {
        ball.x = BALL_R;
        ball.vx *= -1;
        sndWall();
      } else if (ball.x + BALL_R >= W) {
        ball.x = W - BALL_R;
        ball.vx *= -1;
        sndWall();
      }

      if (hitCpu()) applyPaddleBounce(false);
      else if (hitPlayer()) applyPaddleBounce(true);

      if (ball.y - BALL_R > H) {
        sndCpuScore();
        awardGamePoint(true);
        if (!matchOver) {
          ball.x = W / 2;
          ball.y = H / 2;
          ball.vx = 0;
          ball.vy = 0;
          trail.length = 0;
          postScoreUntil = now + 1500;
          nextServeToPlayer = true;
          running = false;
          setStatus('');
        }
      } else if (ball.y + BALL_R < 0) {
        sndPlayerScore();
        awardGamePoint(false);
        if (!matchOver) {
          ball.x = W / 2;
          ball.y = H / 2;
          ball.vx = 0;
          ball.vy = 0;
          trail.length = 0;
          postScoreUntil = now + 1500;
          nextServeToPlayer = false;
          running = false;
          setStatus('');
        }
      }
    }

    if (phase === 'play' && !running && !paused && !matchOver) {
      if (keys.left) player.x = clampPaddle(player.x - PLAYER_SPEED * f);
      if (keys.right) player.x = clampPaddle(player.x + PLAYER_SPEED * f);
    }

    if (running && !paused && !matchOver && now >= postScoreUntil && ball.vx === 0 && ball.vy === 0) {
      resetBall(nextServeToPlayer);
    }

    trail.unshift({ x: ball.x, y: ball.y });
    if (trail.length > TRAIL_LEN) trail.pop();
    const speedT = (ballSpeed - speedMin()) / (speedMax() - speedMin() || 1);
    for (let i = trail.length - 1; i >= 0; i--) {
      const p = trail[i];
      const t = i / (TRAIL_LEN - 1 || 1);
      const alpha = (1 - t) * 0.45;
      ctx.beginPath();
      ctx.arc(p.x, p.y, BALL_R, 0, Math.PI * 2);
      if (col.disco) {
        const h = (discoHue(now, 3000, i * 18) + trail.length * 5) % 360;
        ctx.fillStyle = 'hsla(' + h + ',80%,55%,' + alpha + ')';
      } else {
        const tc = lerpColor(col.trailA, col.trailB, speedT);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = tc;
        ctx.fill();
        ctx.globalAlpha = 1;
        continue;
      }
      ctx.fill();
    }

    ctx.fillStyle = col.ball;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, drawR, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = col.cpu;
    roundRectFill(cpu.x, cpu.y, PADDLE_W, PADDLE_H, 3);
    if (flashCMs > 0) {
      ctx.fillStyle = 'rgba(255,255,255,' + (0.6 * flashCMs / 150) + ')';
      roundRectFill(cpu.x, cpu.y, PADDLE_W, PADDLE_H, 3);
    }
    ctx.fillStyle = col.player;
    roundRectFill(player.x, player.y, PADDLE_W, PADDLE_H, 3);
    if (flashPMs > 0) {
      ctx.fillStyle = 'rgba(255,255,255,' + (0.6 * flashPMs / 150) + ')';
      roundRectFill(player.x, player.y, PADDLE_W, PADDLE_H, 3);
    }
  }

  function roundRectFill(x, y, w, h, r) {
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, w, h, r);
    else {
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
    }
    ctx.fill();
  }

  setScheme(0);
  topBar.classList.add('hidden');
  phase = 'idle';
  setStatus('');
  requestAnimationFrame(tick);
})();
  </script>
  <script>
  function goHome() {
    var o = document.createElement('div');
    o.setAttribute('aria-hidden', 'true');
    o.style.cssText = 'position:fixed;inset:0;background:#000;opacity:0;z-index:100000;transition:opacity 500ms ease;pointer-events:none';
    document.body.appendChild(o);
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        o.style.opacity = '1';
        o.style.pointerEvents = 'auto';
      });
    });
    setTimeout(function () { window.location.href = '/'; }, 500);
  }
  </script>
