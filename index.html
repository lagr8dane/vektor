<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Shall we play a game? AtorGames — arcade and learning games.">
  <title>AtorGames</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      min-height: 100%;
      min-height: 100dvh;
      background: #000;
      color: #3f6;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: "Share Tech Mono", ui-monospace, monospace;
    }
    #terminal-wrap {
      width: 100%;
      max-width: 640px;
      opacity: 0;
      transition: opacity 650ms ease;
    }
    #terminal-wrap.visible { opacity: 1; }
    .term-chrome {
      background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
      border: 1px solid #444;
      border-radius: 6px 6px 0 0;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset;
    }
    .term-dots {
      display: flex;
      gap: 6px;
    }
    .term-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
    }
    .term-dots span:nth-child(1) { background: #c44; }
    .term-dots span:nth-child(2) { background: #ca4; }
    .term-dots span:nth-child(3) { background: #6c4; }
    .term-title {
      flex: 1;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #888;
      text-transform: uppercase;
    }
    .term-screen-outer {
      border: 1px solid #333;
      border-top: none;
      border-radius: 0 0 6px 6px;
      background: #0a0c0a;
      box-shadow:
        0 0 0 1px #000,
        0 12px 40px rgba(0,0,0,0.65),
        inset 0 0 80px rgba(0,40,20,0.15);
    }
    .term-screen {
      position: relative;
      min-height: min(52vh, 420px);
      padding: 20px 18px 24px;
      font-size: 14px;
      line-height: 1.55;
      color: #33ff66;
      text-shadow: 0 0 6px rgba(51, 255, 102, 0.35);
      overflow: hidden;
    }
    @media (max-width: 480px) {
      .term-screen { font-size: 12px; min-height: 48vh; padding: 14px 12px 18px; }
    }
    .term-scanlines {
      pointer-events: none;
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.13) 2px,
        rgba(0, 0, 0, 0.13) 3px
      );
      z-index: 2;
    }
    .term-vignette {
      pointer-events: none;
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.5);
      z-index: 1;
    }
    #term-out {
      position: relative;
      z-index: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .term-line { margin-bottom: 0.35em; }
    .term-dim { color: #1a6; text-shadow: none; }
    .term-prompt { color: #2d8; }
    #question-line {
      margin-top: 1em;
      min-height: 1.6em;
      font-size: clamp(14px, 3.8vw, 17px);
      letter-spacing: 0.04em;
    }
    #type-cursor {
      display: inline-block;
      width: 0.55em;
      height: 1.1em;
      background: #33ff66;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: curBlink 0.9s step-end infinite;
      box-shadow: 0 0 8px #33ff66;
    }
    #type-cursor.off { display: none; }
    @keyframes curBlink { 50% { opacity: 0; } }
    #wargames-attrib {
      font-family: Arial, sans-serif;
      font-size: 10px;
      font-style: italic;
      color: rgba(51, 255, 102, 0.22);
      margin-top: 12px;
      opacity: 0;
      transition: opacity 500ms ease;
    }
    #wargames-attrib.visible { opacity: 1; }
    #cta-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 28px;
      opacity: 0;
    }
    #cta-row.visible {
      opacity: 1;
      transition: opacity 400ms ease;
    }
    #cta-row.visible .cta-btn:nth-child(1) { transition: opacity 400ms ease; opacity: 1; }
    #cta-row.visible .cta-btn:nth-child(2) { transition: opacity 400ms ease 200ms; opacity: 1; }
    @media (max-width: 480px) {
      #cta-row {
        flex-direction: column;
        gap: 12px;
        max-width: 280px;
        margin-left: auto;
        margin-right: auto;
      }
    }
    .cta-btn {
      border: 1px solid rgba(51, 255, 102, 0.35);
      background: rgba(51, 255, 102, 0.06);
      color: rgba(51, 255, 102, 0.88);
      padding: 14px 28px;
      font-family: "Share Tech Mono", ui-monospace, monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      opacity: 0;
      text-shadow: 0 0 4px rgba(51, 255, 102, 0.3);
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease, color 180ms ease;
    }
    @media (hover: hover) and (pointer: fine) {
      .cta-btn:hover {
        background: rgba(51, 255, 102, 0.12);
        border-color: rgba(51, 255, 102, 0.55);
        transform: translateY(-1px);
        color: #8f8;
      }
    }
    #transition-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 400ms ease, background 600ms ease;
    }
    #transition-overlay.flash-vektor {
      opacity: 1;
      background: #0f0d08;
      pointer-events: auto;
    }
    #transition-overlay.flash-gunner {
      opacity: 1;
      background: #5BA3D9;
      pointer-events: auto;
    }
    #transition-msg {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 101;
      text-align: center;
      opacity: 0;
      transition: opacity 400ms ease;
      width: 90%;
      max-width: 640px;
      padding: 20px;
    }
    #transition-msg.visible { opacity: 1; }
    .msg-vektor {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(28px, 8vw, 48px);
      color: #c8a96e;
      letter-spacing: 0.25em;
      text-indent: 0.25em;
    }
    .msg-gunner {
      font-family: "Press Start 2P", ui-monospace, monospace;
      font-size: clamp(10px, 2.8vw, 14px);
      color: #FFE066;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="terminal-wrap">
    <div class="term-chrome">
      <div class="term-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      <div class="term-title">WOPR — ATORGAMES UPLINK</div>
      <div style="width:46px"></div>
    </div>
    <div class="term-screen-outer">
      <div class="term-screen">
        <div class="term-vignette"></div>
        <div class="term-scanlines"></div>
        <div id="term-out"></div>
        <div id="question-line" aria-live="polite"><span id="typed-q"></span><span id="type-cursor" class="off"></span></div>
        <p id="wargames-attrib">— WarGames, 1983</p>
        <div id="cta-row">
          <button type="button" class="cta-btn" id="btn-arcade">I'm here for arcade</button>
          <button type="button" class="cta-btn" id="btn-gunner">I'm here for Gunner!</button>
        </div>
      </div>
    </div>
  </div>

  <div id="transition-overlay"></div>
  <div id="transition-msg"></div>

  <script>
(function () {
  var wrap = document.getElementById('terminal-wrap');
  var out = document.getElementById('term-out');
  var typedQ = document.getElementById('typed-q');
  var cursorEl = document.getElementById('type-cursor');
  var attribEl = document.getElementById('wargames-attrib');
  var ctaRow = document.getElementById('cta-row');
  var btnArcade = document.getElementById('btn-arcade');
  var btnGunner = document.getElementById('btn-gunner');
  var overlay = document.getElementById('transition-overlay');
  var transMsg = document.getElementById('transition-msg');

  var actx = null;
  function tickSound() {
    try {
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
      if (actx.state === 'suspended') void actx.resume();
      var sr = actx.sampleRate;
      var n = Math.max(48, Math.floor(sr * 0.015));
      var buf = actx.createBuffer(1, n, sr);
      var d = buf.getChannelData(0);
      for (var i = 0; i < n; i++) {
        d[i] = Math.sin(2 * Math.PI * 2000 * i / sr) * 0.035 * (1 - i / n);
      }
      var src = actx.createBufferSource();
      src.buffer = buf;
      var g = actx.createGain();
      g.gain.value = 0.45;
      src.connect(g);
      g.connect(actx.destination);
      src.start();
    } catch (e) {}
  }

  function typeInto(el, text, msPerChar, done, withSound) {
    var i = 0;
    function step() {
      if (i < text.length) {
        el.textContent += text.charAt(i);
        i++;
        if (withSound) tickSound();
        setTimeout(step, msPerChar);
      } else if (done) done();
    }
    el.textContent = '';
    step();
  }

  function addLine(html, className) {
    var div = document.createElement('div');
    div.className = 'term-line' + (className ? ' ' + className : '');
    div.innerHTML = html;
    out.appendChild(div);
  }

  var bootLines = [
    { text: '*** UPLINK ESTABLISHED ***', ms: 22, dim: true, sound: false },
    { text: 'WOPR_SUBSYSTEM ................ ONLINE', ms: 12, dim: true, sound: false },
    { text: 'SESSION ....................... GUEST', ms: 12, dim: true, sound: false },
    { text: 'MEM: 64K  BUFFER OK  CHECKSUM OK', ms: 10, dim: true, sound: false },
    { text: '', ms: 0, dim: true, sound: false },
    { text: '> HELLO.', ms: 35, dim: false, sound: true }
  ];

  function runBoot(i, done) {
    if (i >= bootLines.length) {
      done();
      return;
    }
    var row = bootLines[i];
    if (!row.text) {
      addLine('&nbsp;', 'term-dim');
      runBoot(i + 1, done);
      return;
    }
    var div = document.createElement('div');
    div.className = 'term-line' + (row.dim ? ' term-dim' : ' term-prompt');
    out.appendChild(div);
    typeInto(div, row.text, row.ms, function () {
      runBoot(i + 1, done);
    }, row.sound);
  }

  function runQuestion(done) {
    cursorEl.classList.remove('off');
    var phrase = 'Shall we play a game?';
    attribEl.classList.add('visible');
    var j = 0;
    function qStep() {
      if (j < phrase.length) {
        typedQ.textContent += phrase.charAt(j);
        j++;
        tickSound();
        setTimeout(qStep, 42);
      } else {
        var blinks = 0;
        function blinkC() {
          blinks++;
          if (blinks <= 6) {
            cursorEl.style.visibility = blinks % 2 ? 'visible' : 'hidden';
            setTimeout(blinkC, 380);
          } else {
            cursorEl.classList.add('off');
            ctaRow.classList.add('visible');
            done();
          }
        }
        setTimeout(blinkC, 280);
      }
    }
    setTimeout(qStep, 400);
  }

  function loadPressStart(cb) {
    if (document.getElementById('ps2p-font')) {
      cb();
      return;
    }
    var l = document.createElement('link');
    l.id = 'ps2p-font';
    l.rel = 'stylesheet';
    l.href = 'https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap';
    l.onload = function () { cb(); };
    l.onerror = function () { cb(); };
    document.head.appendChild(l);
    setTimeout(cb, 300);
  }

  function goArcade() {
    document.getElementById('terminal-wrap').style.opacity = '0';
    document.getElementById('terminal-wrap').style.transition = 'opacity 400ms ease';
    overlay.className = 'flash-vektor';
    transMsg.innerHTML = '<div class="msg-vektor">V E K T O R</div>';
    transMsg.classList.add('visible');
    setTimeout(function () {
      window.location.href = '/vektor/';
    }, 800);
  }

  function goGunner() {
    loadPressStart(function () {
      document.getElementById('terminal-wrap').style.opacity = '0';
      document.getElementById('terminal-wrap').style.transition = 'opacity 400ms ease';
      overlay.className = 'flash-gunner';
      transMsg.innerHTML = '<div class="msg-gunner">PROFESSOR GUNNER\'S<br>SCHOOLHOUSE</div>';
      transMsg.classList.add('visible');
      setTimeout(function () {
        window.location.href = '/gunner/';
      }, 800);
    });
  }

  btnArcade.addEventListener('click', goArcade);
  btnGunner.addEventListener('click', goGunner);

  document.addEventListener('touchstart', function () {
    try {
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
      void actx.resume();
    } catch (e) {}
  }, { once: true, passive: true });

  requestAnimationFrame(function () {
    wrap.classList.add('visible');
  });

  setTimeout(function () {
    runBoot(0, function () {
      setTimeout(function () {
        runQuestion(function () {});
      }, 500);
    });
  }, 520);
})();
  </script>
</body>
</html>
