<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vektor — AtorGames arcade collection">
  <title>Vektor — AtorGames</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      min-height: 100dvh;
      background: #0f0d08;
      color: #c8a96e;
      font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace;
      font-size: 13px;
    }
    body {
      padding: 20px 16px 32px;
      max-width: 720px;
      margin: 0 auto;
    }
    .top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2a2318;
    }
    .brand {
      font-size: 18px;
      letter-spacing: 0.35em;
      text-indent: 0.35em;
      color: var(--primary, #c8a96e);
    }
    .scheme-pill {
      border: 1px solid var(--border, #2a2318);
      background: transparent;
      color: var(--primary, #c8a96e);
      padding: 6px 12px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.15em;
      cursor: pointer;
      min-height: 36px;
    }
    .scheme-pill:active { opacity: 0.85; }
    .sub {
      font-size: 10px;
      letter-spacing: 0.55em;
      text-indent: 0.55em;
      color: var(--muted, #6b5c3e);
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    .rows { display: flex; flex-direction: column; gap: 0; }
    .row {
      display: grid;
      grid-template-columns: minmax(100px, 1fr) minmax(0, 2fr) auto;
      gap: 10px 14px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid transparent;
      border-radius: 4px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    @media (hover: hover) and (pointer: fine) {
      .row:hover {
        background: rgba(107, 92, 62, 0.12);
        cursor: pointer;
      }
    }
    .row-name { font-weight: 600; letter-spacing: 0.08em; color: var(--primary, #c8a96e); }
    .row-desc { font-size: 11px; color: var(--muted, #6b5c3e); line-height: 1.4; }
    .row-meta { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .row-arrow { color: var(--muted, #6b5c3e); font-size: 12px; }
    .pill-tag {
      font-size: 9px;
      letter-spacing: 0.12em;
      padding: 3px 8px;
      border: 1px solid var(--primary, #c8a96e);
      color: var(--primary, #c8a96e);
      border-radius: 999px;
      white-space: nowrap;
    }
    .row.phalanx {
      border-color: rgba(200, 169, 110, 0.45);
      background: rgba(200, 169, 110, 0.06);
    }
    @media (max-width: 520px) {
      .row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .row-meta { justify-content: flex-start; }
    }
    footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #2a2318;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--muted, #6b5c3e);
      text-align: center;
    }
    .hint {
      margin-top: 20px;
      font-size: 10px;
      color: var(--vmuted, #3a3025);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="brand">VEKTOR</div>
    <button type="button" class="scheme-pill" id="schemePill" aria-label="Cycle color scheme">AMBER</button>
  </header>
  <p class="sub">A T O R&nbsp;&nbsp;G A M E S</p>
  <nav class="rows" aria-label="Games">
    <a class="row" href="/vektor/v1/">
      <span class="row-name">RALLY</span>
      <span class="row-desc">ball-and-paddle</span>
      <span class="row-meta"><span class="pill-tag">LIVE</span><span class="row-arrow">→</span></span>
    </a>
    <a class="row" href="/vektor/v2/">
      <span class="row-name">RALLY ENHANCED</span>
      <span class="row-desc">color schemes</span>
      <span class="row-meta"><span class="pill-tag">LIVE</span><span class="row-arrow">→</span></span>
    </a>
    <a class="row" href="/vektor/v4/">
      <span class="row-name">DEBRIS</span>
      <span class="row-desc">asteroid field</span>
      <span class="row-meta"><span class="pill-tag">BETA</span><span class="row-arrow">→</span></span>
    </a>
    <a class="row" href="/vektor/breach/">
      <span class="row-name">BREACH</span>
      <span class="row-desc">grid infiltration</span>
      <span class="row-meta"><span class="pill-tag">LIVE</span><span class="row-arrow">→</span></span>
    </a>
    <a class="row phalanx" href="/vektor/phalanx/">
      <span class="row-name">PHALANX</span>
      <span class="row-desc">arena sport</span>
      <span class="row-meta"><span class="pill-tag">NEW</span><span class="row-arrow">→</span></span>
    </a>
  </nav>
  <!-- CHARITY MODULE: insert here in future build -->
  <p class="hint">Press <kbd>T</kbd> to cycle schemes</p>
  <footer>ATOR GAMES&nbsp;&nbsp;·&nbsp;&nbsp;atorgames.com</footer>
  <script>
(function () {
  var SCHEMES = [
    { name: 'AMBER', primary: '#c8a96e', muted: '#6b5c3e', vmuted: '#3a3025', border: '#2a2318' },
    { name: 'PHOSPHOR', primary: '#39d353', muted: '#1a6b28', vmuted: '#0a2010', border: '#061208' },
    { name: 'COBALT', primary: '#4d9fff', muted: '#1a4080', vmuted: '#0a1530', border: '#080c18' },
    { name: 'CRIMSON', primary: '#ff4d6a', muted: '#801a28', vmuted: '#300a12', border: '#180608' },
    { name: 'IVORY', primary: '#e8e4d0', muted: '#888070', vmuted: '#2a2a28', border: '#1e1e1c' },
    { name: 'VIOLET', primary: '#b06eff', muted: '#5020a0', vmuted: '#1a0a30', border: '#100818' },
    { name: 'EMBER', primary: '#ff7c2a', muted: '#803010', vmuted: '#301505', border: '#180c04' }
  ];
  var i = 0;
  function apply() {
    var s = SCHEMES[i];
    document.documentElement.style.setProperty('--primary', s.primary);
    document.documentElement.style.setProperty('--muted', s.muted);
    document.documentElement.style.setProperty('--vmuted', s.vmuted);
    document.documentElement.style.setProperty('--border', s.border);
    document.getElementById('schemePill').textContent = s.name;
    try {
      localStorage.setItem('vektor-hub-scheme', String(i));
    } catch (e) {}
  }
  try {
    var si = localStorage.getItem('vektor-hub-scheme');
    if (si != null) i = Math.max(0, Math.min(SCHEMES.length - 1, parseInt(si, 10) || 0));
  } catch (e) {}
  apply();
  function cycle() {
    i = (i + 1) % SCHEMES.length;
    apply();
  }
  document.getElementById('schemePill').addEventListener('click', cycle);
  document.addEventListener('keydown', function (e) {
    if (e.code === 'KeyT' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
      e.preventDefault();
      cycle();
    }
  });
})();
  </script>
</body>
</html>
