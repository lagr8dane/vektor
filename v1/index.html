<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vektor — V1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: #16130e;
      font-family: Georgia, "Times New Roman", serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px 12px 24px;
      position: relative;
    }
    .back {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: #d4b87e;
      text-transform: uppercase;
      text-decoration: none;
      font-family: system-ui, sans-serif;
      transition: background 200ms ease, color 200ms ease, border-color 200ms ease;
      z-index: 10;
      min-height: 44px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(212, 184, 126, 0.55);
      border-radius: 3px;
      background: rgba(212, 184, 126, 0.08);
      box-sizing: border-box;
    }
    @media (hover: hover) and (pointer: fine) {
      .back:hover {
        color: #f0e6c8;
        background: rgba(212, 184, 126, 0.16);
        border-color: rgba(240, 230, 200, 0.5);
      }
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      width: min(600px, 96vw);
      max-width: 600px;
      margin-bottom: 10px;
      font-family: system-ui, sans-serif;
    }
    .score-side { text-align: center; flex: 1; }
    .score-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #8f7d56;
      text-transform: uppercase;
    }
    .score-num {
      font-family: Georgia, serif;
      font-size: 32px;
      color: #d4b87e;
      line-height: 1.1;
    }
    .canvas-wrap {
      position: relative;
      width: min(600px, 96vw);
      max-width: 600px;
    }
    canvas {
      display: block;
      width: min(600px, 96vw);
      height: auto;
      aspect-ratio: 600 / 400;
      background: #16130e;
    }
    .status {
      margin-top: 14px;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #6d5e42;
      text-transform: uppercase;
      text-align: center;
      font-family: system-ui, sans-serif;
      width: min(600px, 96vw);
    }
    .hint {
      margin-top: 8px;
      font-size: 10px;
      color: #524832;
      letter-spacing: 0.06em;
      text-align: center;
      font-family: system-ui, sans-serif;
      width: min(600px, 96vw);
    }
    .touch-bar {
      display: none;
      width: min(600px, 96vw);
      max-width: 600px;
      margin-top: 0;
      border-top: 1px solid #3a3228;
      flex-direction: column;
    }
    .touch-bar.show { display: flex; }
    .touch-space {
      width: 100%;
      height: 44px;
      min-height: 44px;
      background: rgba(212, 184, 126, 0.1);
      border: none;
      border-bottom: 1px solid #3a3228;
      color: #d4b87e;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: system-ui, sans-serif;
    }
    .touch-row {
      display: flex;
      width: 100%;
    }
    .touch-arrow {
      flex: 1;
      height: 56px;
      min-height: 56px;
      background: rgba(212, 184, 126, 0.1);
      border: none;
      color: #d4b87e;
      font-size: 20px;
      font-family: system-ui, sans-serif;
    }
    .touch-arrow:first-child { border-right: 1px solid #3a3228; }
    .sound-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #d4b87e;
      text-transform: uppercase;
      font-family: system-ui, sans-serif;
      transition: background 200ms ease, color 200ms ease, border-color 200ms ease;
      z-index: 10;
      min-height: 44px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(212, 184, 126, 0.55);
      border-radius: 3px;
      background: rgba(212, 184, 126, 0.08);
      cursor: pointer;
      box-sizing: border-box;
    }
    .sound-toggle[aria-pressed="false"] {
      color: #6d5e42;
      border-color: rgba(109, 94, 66, 0.5);
      background: rgba(0, 0, 0, 0.15);
    }
    @media (hover: hover) and (pointer: fine) {
      .sound-toggle:hover {
        color: #f0e6c8;
        background: rgba(212, 184, 126, 0.16);
        border-color: rgba(240, 230, 200, 0.5);
      }
      .sound-toggle[aria-pressed="false"]:hover {
        color: #8f7d56;
      }
    }
  </style>
</head>
<body>
  <a class="back" href="/">← Back</a>
  <button type="button" class="sound-toggle" id="soundToggle" aria-pressed="true" aria-label="Toggle game sound">Sound on</button>
  <div class="score-row">
    <div class="score-side">
      <div class="score-label">You</div>
      <div class="score-num" id="scoreP">0</div>
    </div>
    <div class="score-side">
      <div class="score-label">CPU</div>
      <div class="score-num" id="scoreC">0</div>
    </div>
  </div>
  <div class="canvas-wrap">
    <canvas id="c" width="600" height="400"></canvas>
  </div>
  <p class="status" id="status">Press space to start</p>
  <p class="hint" id="hintDesk">← → OR A D TO MOVE · SPACE TO PAUSE</p>
  <div class="touch-bar" id="touchBar">
    <button type="button" class="touch-space" id="touchSpace">Tap to start</button>
    <div class="touch-row">
      <button type="button" class="touch-arrow" id="touchL" aria-label="Left">◀</button>
      <button type="button" class="touch-arrow" id="touchR" aria-label="Right">▶</button>
    </div>
  </div>
  <script>
(function () {
  const W = 600, H = 400;
  const PADDLE_W = 80, PADDLE_H = 10;
  const BALL_R = 7;
  const SPEED = 4.5;
  const CPU_SPEED = 3.2;
  const PLAYER_SPEED = 7;
  const TRAIL_LEN = 8;
  const FRAME_MS = 1000 / 60;

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const elP = document.getElementById('scoreP');
  const elC = document.getElementById('scoreC');
  const elStatus = document.getElementById('status');
  const hintDesk = document.getElementById('hintDesk');
  const touchBar = document.getElementById('touchBar');
  const touchSpace = document.getElementById('touchSpace');
  const touchL = document.getElementById('touchL');
  const touchR = document.getElementById('touchR');

  const isTouchUI = 'ontouchstart' in window || (window.matchMedia && matchMedia('(pointer: coarse)').matches);
  if (isTouchUI) {
    touchBar.classList.add('show');
    hintDesk.style.display = 'none';
  }

  const SOUND_KEY = 'vektor-v1-sound';
  let soundEnabled = localStorage.getItem(SOUND_KEY) !== '0';
  const soundToggle = document.getElementById('soundToggle');
  function syncSoundUi() {
    soundToggle.textContent = soundEnabled ? 'Sound on' : 'Sound off';
    soundToggle.setAttribute('aria-pressed', soundEnabled ? 'true' : 'false');
  }
  syncSoundUi();
  soundToggle.addEventListener('click', function () {
    soundEnabled = !soundEnabled;
    localStorage.setItem(SOUND_KEY, soundEnabled ? '1' : '0');
    syncSoundUi();
    if (soundEnabled) {
      ensureAudio();
      primeAudioFromGesture();
    }
  });

  let audioCtx = null;
  let audioPrimed = false;
  function ensureAudio() {
    if (!soundEnabled) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!audioCtx && AC) audioCtx = new AC();
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') void audioCtx.resume();
  }
  /** iOS Safari: AudioContext must resume from a gesture; resume() is async. */
  function primeAudioFromGesture() {
    if (!soundEnabled) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!audioCtx && AC) audioCtx = new AC();
    if (!audioCtx) return;
    const playSilent = function () {
      try {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.02);
      } catch (e) {}
    };
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(playSilent);
    } else if (!audioPrimed) {
      playSilent();
    }
    audioPrimed = true;
  }
  document.addEventListener('touchstart', primeAudioFromGesture, { capture: true, passive: true });
  document.addEventListener('pointerdown', primeAudioFromGesture, { capture: true, passive: true });

  function beep({ type, freq, dur, vol }) {
    if (!soundEnabled || !audioCtx) return;
    const play = function () {
      const t0 = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(vol, t0 + 0.005);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
      osc.connect(g);
      g.connect(audioCtx.destination);
      osc.start(t0);
      osc.stop(t0 + dur + 0.02);
    };
    if (audioCtx.state === 'running') play();
    else void audioCtx.resume().then(play);
  }

  function sndPlayerHit() { beep({ type: 'square', freq: 440, dur: 0.1, vol: 0.15 }); }
  function sndCpuHit() { beep({ type: 'square', freq: 330, dur: 0.1, vol: 0.12 }); }
  function sndWall() { beep({ type: 'sine', freq: 220, dur: 0.08, vol: 0.1 }); }
  function sndPlayerScore() { beep({ type: 'square', freq: 660, dur: 0.25, vol: 0.18 }); }
  function sndCpuScore() {
    if (!soundEnabled || !audioCtx) return;
    const play = function () {
      const t0 = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(160, t0);
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.2, t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.3);
      osc.connect(g);
      g.connect(audioCtx.destination);
      osc.start(t0);
      osc.stop(t0 + 0.35);
    };
    if (audioCtx.state === 'running') play();
    else void audioCtx.resume().then(play);
  }

  let scoreP = 0, scoreC = 0;
  let running = false;
  let paused = false;
  let postScoreUntil = 0;
  let nextServeToPlayer = true;

  const player = { x: W / 2 - PADDLE_W / 2, y: H - 24 - PADDLE_H };
  const cpu = { x: W / 2 - PADDLE_W / 2, y: 24 };
  const ball = { x: W / 2, y: H / 2, vx: 0, vy: 0 };
  const trail = [];

  const keys = { left: false, right: false };

  function resetBall(serveTowardPlayer) {
    ball.x = W / 2;
    ball.y = H / 2;
    const angle = (Math.random() - 0.5) * Math.PI * 0.5;
    const dir = serveTowardPlayer ? 1 : -1;
    ball.vx = Math.sin(angle) * SPEED * (Math.random() < 0.5 ? -1 : 1);
    ball.vy = Math.cos(angle) * SPEED * dir;
    const mag = Math.hypot(ball.vx, ball.vy) || 1;
    ball.vx = (ball.vx / mag) * SPEED;
    ball.vy = (ball.vy / mag) * SPEED;
    trail.length = 0;
  }

  function setStatus(text) {
    elStatus.textContent = text;
    if (isTouchUI) {
      if (!running && !paused) touchSpace.textContent = 'Tap to start';
      else if (paused) touchSpace.textContent = 'Resume';
      else touchSpace.textContent = 'Pause';
    }
  }

  function launchIfStopped() {
    ensureAudio();
    if (!running) {
      running = true;
      paused = false;
      resetBall(Math.random() < 0.5);
      setStatus('');
    }
  }

  function togglePause() {
    ensureAudio();
    if (!running) {
      launchIfStopped();
      return;
    }
    paused = !paused;
    setStatus(paused ? 'Paused' : '');
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') { keys.left = true; e.preventDefault(); }
    if (e.code === 'ArrowRight' || e.code === 'KeyD') { keys.right = true; e.preventDefault(); }
    if (e.code === 'Space') { e.preventDefault(); togglePause(); }
  });
  document.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
  });

  function bindTouch(btn, onDown, onUp) {
    const down = (e) => { e.preventDefault(); onDown(); };
    const up = (e) => { e.preventDefault(); onUp(); };
    btn.addEventListener('touchstart', down, { passive: false });
    btn.addEventListener('touchend', up);
    btn.addEventListener('touchcancel', up);
    btn.addEventListener('mousedown', (e) => { e.preventDefault(); onDown(); });
    btn.addEventListener('mouseup', onUp);
    btn.addEventListener('mouseleave', onUp);
  }

  bindTouch(touchL, () => { keys.left = true; ensureAudio(); }, () => { keys.left = false; });
  bindTouch(touchR, () => { keys.right = true; ensureAudio(); }, () => { keys.right = false; });
  touchSpace.addEventListener('click', () => togglePause());
  touchSpace.addEventListener('touchstart', (e) => { e.preventDefault(); togglePause(); }, { passive: false });

  function clampPaddle(px) {
    return Math.max(0, Math.min(W - PADDLE_W, px));
  }

  function hitPlayer() {
    if (ball.vy <= 0) return false;
    const py = player.y;
    if (ball.y + BALL_R < py) return false;
    if (ball.y + BALL_R > py + PADDLE_H + BALL_R) return false;
    if (ball.x < player.x - BALL_R || ball.x > player.x + PADDLE_W + BALL_R) return false;
    return true;
  }

  function hitCpu() {
    if (ball.vy >= 0) return false;
    const cy = cpu.y;
    if (ball.y - BALL_R > cy + PADDLE_H) return false;
    if (ball.y - BALL_R < cy - BALL_R) return false;
    if (ball.x < cpu.x - BALL_R || ball.x > cpu.x + PADDLE_W + BALL_R) return false;
    return true;
  }

  function applyPaddleBounce(isPlayer) {
    const paddle = isPlayer ? player : cpu;
    const pc = paddle.x + PADDLE_W / 2;
    let relative = (ball.x - pc) / (PADDLE_W / 2);
    relative = Math.max(-1, Math.min(1, relative));
    const maxAng = Math.PI * 0.35;
    const angle = relative * maxAng;
    if (isPlayer) {
      ball.vx = Math.sin(angle) * SPEED;
      ball.vy = -Math.abs(Math.cos(angle) * SPEED);
    } else {
      ball.vx = Math.sin(angle) * SPEED;
      ball.vy = Math.abs(Math.cos(angle) * SPEED);
    }
    const mag = Math.hypot(ball.vx, ball.vy) || 1;
    ball.vx = (ball.vx / mag) * SPEED;
    ball.vy = (ball.vy / mag) * SPEED;
    if (isPlayer) {
      ball.y = player.y - BALL_R;
      sndPlayerHit();
    } else {
      ball.y = cpu.y + PADDLE_H + BALL_R;
      sndCpuHit();
    }
  }

  let lastTick = 0;
  function tick(now) {
    requestAnimationFrame(tick);
    const dtMs = lastTick ? Math.min(64, now - lastTick) : FRAME_MS;
    lastTick = now;
    const f = dtMs / FRAME_MS;

    ctx.fillStyle = '#16130e';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#2a2418';
    ctx.setLineDash([6, 8]);
    ctx.beginPath();
    ctx.moveTo(0, H / 2);
    ctx.lineTo(W, H / 2);
    ctx.stroke();
    ctx.setLineDash([]);

    if (running && !paused && now >= postScoreUntil) {
      if (keys.left) player.x = clampPaddle(player.x - PLAYER_SPEED * f);
      if (keys.right) player.x = clampPaddle(player.x + PLAYER_SPEED * f);

      const target = ball.x + ball.vx * 8;
      const cx = cpu.x + PADDLE_W / 2;
      if (target < cx - 2) cpu.x = clampPaddle(cpu.x - CPU_SPEED * f);
      else if (target > cx + 2) cpu.x = clampPaddle(cpu.x + CPU_SPEED * f);

      ball.x += ball.vx * f;
      ball.y += ball.vy * f;

      if (ball.x - BALL_R <= 0) {
        ball.x = BALL_R;
        ball.vx *= -1;
        sndWall();
      } else if (ball.x + BALL_R >= W) {
        ball.x = W - BALL_R;
        ball.vx *= -1;
        sndWall();
      }

      if (hitCpu()) applyPaddleBounce(false);
      else if (hitPlayer()) applyPaddleBounce(true);

      if (ball.y - BALL_R > H) {
        scoreC++;
        elC.textContent = scoreC;
        sndCpuScore();
        ball.x = W / 2;
        ball.y = H / 2;
        ball.vx = 0;
        ball.vy = 0;
        trail.length = 0;
        postScoreUntil = now + 1500;
        nextServeToPlayer = true;
      } else if (ball.y + BALL_R < 0) {
        scoreP++;
        elP.textContent = scoreP;
        sndPlayerScore();
        ball.x = W / 2;
        ball.y = H / 2;
        ball.vx = 0;
        ball.vy = 0;
        trail.length = 0;
        postScoreUntil = now + 1500;
        nextServeToPlayer = false;
      }
    }

    if (running && !paused && now >= postScoreUntil && ball.vx === 0 && ball.vy === 0) {
      resetBall(nextServeToPlayer);
    }

    trail.unshift({ x: ball.x, y: ball.y });
    if (trail.length > TRAIL_LEN) trail.pop();
    for (let i = trail.length - 1; i >= 0; i--) {
      const p = trail[i];
      const t = i / (TRAIL_LEN - 1 || 1);
      const alpha = (1 - t) * 0.4;
      ctx.beginPath();
      ctx.fillStyle = 'rgba(212, 184, 126,' + alpha + ')';
      ctx.arc(p.x, p.y, BALL_R, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = '#d4b87e';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#957550';
    roundRect(cpu.x, cpu.y, PADDLE_W, PADDLE_H, 3);
    ctx.fillStyle = '#d4b87e';
    roundRect(player.x, player.y, PADDLE_W, PADDLE_H, 3);
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, w, h, r);
    else {
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
    }
    ctx.fill();
  }

  requestAnimationFrame(tick);
})();
  </script>
</body>
</html>
