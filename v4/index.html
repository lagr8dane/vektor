<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vektor — V4</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: #0f0d08; font-family: Georgia, serif; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 0 0;
      position: relative;
      transition: background 0.2s ease;
    }
    body.touch-ui {
      padding-top: max(16px, env(safe-area-inset-top, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    body.touch-ui .hub-back {
      top: max(12px, env(safe-area-inset-top, 0px) + 4px);
      left: max(16px, env(safe-area-inset-left, 0px) + 8px);
    }
    body.touch-ui .sound-toggle {
      top: max(10px, env(safe-area-inset-top, 0px) + 2px);
      right: max(12px, env(safe-area-inset-right, 0px) + 8px);
    }
    .palette-heading {
      width: 100%;
      text-align: center;
      font-family: system-ui, sans-serif;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #5a4d38;
      margin-top: 10px;
    }
    @media (max-width: 480px) {
      .palette-heading { display: none; }
    }
    .palette-heading-mobi {
      display: none;
      width: 100%;
      text-align: center;
      font-family: system-ui, sans-serif;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #5a4d38;
      margin-top: 6px;
    }
    .palette-heading-mobi.show { display: block; }
    .hub-back {
      position: absolute;
      top: 20px;
      left: 24px;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #3a3025;
      text-transform: uppercase;
      text-decoration: none;
      font-family: system-ui, sans-serif;
      transition: color 150ms ease;
      z-index: 30;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }
    @media (hover: hover) and (pointer: fine) {
      .hub-back:hover { color: #c8a96e; }
    }
    .sound-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: rgba(255, 248, 230, 0.92);
      text-transform: uppercase;
      font-family: system-ui, sans-serif;
      z-index: 30;
      min-height: 44px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,0.32);
      border-radius: 3px;
      background: rgba(0,0,0,0.35);
      cursor: pointer;
    }
    .wrap-main {
      width: min(100vw, 100dvw, 1440px);
      max-width: 1440px;
    }
    body.touch-ui .wrap-main {
      width: min(
        100vw,
        100dvw,
        max(280px, calc((100svh - env(safe-area-inset-bottom, 0px) - 172px) * 800 / 600)),
        1440px
      );
      margin-top: 52px;
    }
    .canvas-wrap {
      position: relative;
      width: 100%;
      margin-top: 8px;
    }
    body.touch-ui .canvas-wrap { margin-top: 4px; }
    body.touch-ui .palette-heading { margin-top: 18px; }
    body.touch-ui .palette-heading-mobi { margin-top: 16px; }
    body.touch-ui .pill-mobi { margin-top: 16px; margin-bottom: 10px; }
    body.touch-ui .pills { margin-top: 18px; margin-bottom: 14px; }
    .scanlines {
      pointer-events: none;
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 800 / 600;
      position: relative;
      z-index: 0;
    }
    canvas.can-tap { cursor: pointer; }
    .pause-ii {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      width: 36px;
      height: 36px;
      z-index: 15;
      border: 1px solid rgba(200,169,110,0.25);
      background: rgba(200,169,110,0.06);
      color: #c8a96e;
      font-size: 11px;
      font-family: system-ui, sans-serif;
      cursor: pointer;
    }
    .pause-ii.show { display: flex; align-items: center; justify-content: center; }
    .pause-ii:active { background: rgba(200,169,110,0.18); }
    .pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 12px 0; font-family: system-ui, sans-serif; }
    .pill {
      border: 1px solid rgba(200,169,110,0.4);
      background: transparent;
      color: #6b5c3e;
      padding: 6px 10px;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      min-height: 32px;
    }
    .pill.active { background: rgba(200,169,110,0.15); color: #c8a96e; }
    .pill-mobi { display: none; width: 100%; margin: 12px 0; font-family: system-ui, sans-serif; }
    .pill-mobi.show { display: flex; }
    .pill-mobi-inner { display: flex; width: 100%; min-height: 44px; }
    .pill-nav { flex: 0 0 48px; border: 1px solid rgba(200,169,110,0.4); background: transparent; color: #c8a96e; font-size: 14px; }
    .pill-mobi-label {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-top: 1px solid rgba(200,169,110,0.4);
      border-bottom: 1px solid rgba(200,169,110,0.4);
    }
    @media (max-width: 480px) {
      .pills { display: none !important; }
      .pill-mobi.show { display: flex; }
    }
    @media (min-width: 481px) {
      .pill-mobi { display: none !important; }
    }
    .touch-bar {
      display: none;
      width: 100vw;
      height: 100px;
      border-top: 1px solid #2a2318;
      background: rgba(0,0,0,0.6);
    }
    .touch-bar.show { display: flex; }
    .touch-split {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      align-items: stretch;
    }
    .touch-rot-side {
      flex: 0 0 13%;
      max-width: 76px;
      min-width: 44px;
      background: rgba(200,169,110,0.06);
      border: none;
      border-right: 1px solid #2a2318;
      color: #c8a96e;
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: system-ui, sans-serif;
      padding: 4px 2px;
      line-height: 1.15;
    }
    .touch-rot-side:last-of-type {
      border-right: none;
      border-left: 1px solid #2a2318;
    }
    .touch-rot-side:active, .touch-act:active { background: rgba(200,169,110,0.18); }
    .touch-act {
      flex: 1 1 0;
      min-width: 0;
      border: none;
      border-right: 1px solid #2a2318;
      background: rgba(200,169,110,0.06);
      color: #c8a96e;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: system-ui, sans-serif;
    }
    .touch-act:last-child { border-right: none; }
  </style>
</head>
<body>
  <a class="hub-back" href="/">← vektor</a>
  <button type="button" class="sound-toggle" id="soundToggle" aria-pressed="true">Sound on</button>
  <audio id="iosAudioGate" playsinline preload="auto" style="position:absolute;width:0;height:0;opacity:0;pointer-events:none" aria-hidden="true"></audio>
  <div class="wrap-main">
    <div class="canvas-wrap" id="canvasWrap">
      <div class="scanlines" id="scanlines" style="display:none"></div>
      <canvas id="c" width="800" height="600"></canvas>
      <button type="button" class="pause-ii" id="btnPause" aria-label="Pause">II</button>
    </div>
    <div class="palette-heading" id="paletteHeading">Palette</div>
    <div class="pills" id="pills"></div>
    <div class="palette-heading-mobi" id="paletteHeadingMobi">Palette</div>
    <div class="pill-mobi" id="pillMobi">
      <div class="pill-mobi-inner">
        <button type="button" class="pill-nav" id="pillPrev">◀</button>
        <div class="pill-mobi-label" id="pillMobiName">VEKTOR</div>
        <button type="button" class="pill-nav" id="pillNext">▶</button>
      </div>
    </div>
    <div class="touch-bar" id="touchBar">
      <div class="touch-split">
        <button type="button" class="touch-rot-side" id="tRotL">◀ ROT<br>L</button>
        <button type="button" class="touch-act" id="tThrust">Thrust</button>
        <button type="button" class="touch-act" id="tHyper">Hyper</button>
        <button type="button" class="touch-act" id="tFire">Fire</button>
        <button type="button" class="touch-rot-side" id="tRotR">ROT<br>R ▶</button>
      </div>
    </div>
  </div>
  <script>
(function () {
  const W = 800, H = 600;
  const FRAME_MS = 1000 / 60;
  const DIFF_KEY = 'vektor-difficulty';
  const HS_KEY = 'vektor-asteroids-hs';
  const DIFF_AST = {
    CADET: { asteroidSpeedMult: 0.7, bulletMax: 4, bulletLifetime: 80, bulletCooldown: 10, huntModeWave: 6, huntTurnRate: 0.005, swarmThreshold: 300, extraLifeScore: 15000 },
    PILOT: { asteroidSpeedMult: 1.0, bulletMax: 4, bulletLifetime: 65, bulletCooldown: 12, huntModeWave: 4, huntTurnRate: 0.008, swarmThreshold: 200, extraLifeScore: 10000 },
    ACE: { asteroidSpeedMult: 1.35, bulletMax: 3, bulletLifetime: 55, bulletCooldown: 15, huntModeWave: 2, huntTurnRate: 0.014, swarmThreshold: 150, extraLifeScore: 20000 }
  };
  const DIFF_NAMES = ['CADET', 'PILOT', 'ACE'];
  function loadDiff() {
    var k = localStorage.getItem(DIFF_KEY);
    if (k === 'CADET' || k === 'PILOT' || k === 'ACE') return k;
    return 'PILOT';
  }
  var diffKey = loadDiff();
  function D() { return DIFF_AST[diffKey]; }

  function hexToRgb(hex) {
    var n = parseInt(hex.replace('#', ''), 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }
  function rgbaStr(hex, a) {
    var o = hexToRgb(hex);
    return 'rgba(' + o.r + ',' + o.g + ',' + o.b + ',' + a + ')';
  }
  function colorWithAlpha(c, a) {
    if (!c) return 'rgba(200,169,110,' + a + ')';
    if (c.startsWith('hsl')) return c.replace(/^hsl\(/, 'hsla(').replace(/\)$/, ', ' + a + ')');
    if (c.startsWith('#')) return rgbaStr(c, a);
    return c;
  }
  const SCHEMES = [
    { id: 'v', name: 'VEKTOR', disco: false, bg: '#0f0d08', ship: '#c8a96e', rock: '#7a6040', bullet: '#c8a96e', text: '#c8a96e', scan: null },
    { id: 'g', name: 'GLOW', disco: false, bg: '#050510', ship: '#00ffff', rock: '#0066aa', bullet: '#ffffff', text: '#00ffff', scan: null },
    { id: 'd', name: 'DISCO', disco: true, bg: '#0a0010', ship: null, rock: null, bullet: null, text: null, scan: null },
    { id: 'e', name: 'EDM', disco: false, bg: '#000008', ship: '#ff00ff', rock: '#7700aa', bullet: '#ff00ff', text: '#ff00ff', scan: { px: 3, rgb: '51,0,51', op: 0.08 } },
    { id: 'm', name: 'MIDNIGHT', disco: false, bg: '#080810', ship: '#4488ff', rock: '#224488', bullet: '#88aaff', text: '#4488ff', scan: null },
    { id: 'i', name: 'INFRARED', disco: false, bg: '#0d0000', ship: '#ff3300', rock: '#660000', bullet: '#ff6600', text: '#ff3300', scan: null },
    { id: 'x', name: 'MATRIX', disco: false, bg: '#000a00', ship: '#00ff41', rock: '#003300', bullet: '#00ff41', text: '#00ff41', scan: { px: 2, rgb: '0,34,0', op: 0.06 } }
  ];
  var si = 0;
  function scheme() { return SCHEMES[si]; }
  function discoHue(now, p, o) { return ((now / p * 360) + o) % 360; }
  function resolve(now) {
    var s = scheme();
    if (s.disco) {
      var hp = discoHue(now, 2000, 0);
      var hb = discoHue(now, 3000, 40);
      return {
        bg: s.bg,
        ship: 'hsl(' + hp + ',75%,55%)',
        rock: 'hsl(' + ((hp + 180) % 360) + ',60%,40%)',
        bullet: 'hsl(' + hb + ',85%,60%)',
        text: 'hsl(' + hb + ',85%,60%)',
        scan: null,
        disco: true
      };
    }
    return { bg: s.bg, ship: s.ship, rock: s.rock, bullet: s.bullet, text: s.text, scan: s.scan, disco: false };
  }

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const scanEl = document.getElementById('scanlines');
  const pillsEl = document.getElementById('pills');
  const pillMobi = document.getElementById('pillMobi');
  const pillMobiName = document.getElementById('pillMobiName');
  const touchBar = document.getElementById('touchBar');
  const btnPause = document.getElementById('btnPause');
  const isTouch = 'ontouchstart' in window || (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
  const isNarrow = window.matchMedia && window.matchMedia('(max-width: 480px)').matches;
  if (isTouch) {
    document.body.classList.add('touch-ui');
    touchBar.classList.add('show');
    btnPause.classList.add('show');
    canvas.classList.add('can-tap');
  }
  if (isNarrow) {
    pillMobi.classList.add('show');
    document.getElementById('paletteHeadingMobi').classList.add('show');
  }

  SCHEMES.forEach(function (s, i) {
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'pill';
    b.textContent = s.name;
    b.addEventListener('click', function () { setSch(i); });
    pillsEl.appendChild(b);
  });
  function setSch(i) {
    si = (i + SCHEMES.length) % SCHEMES.length;
    var col = resolve(performance.now());
    updateScan(col);
    pillsEl.querySelectorAll('.pill').forEach(function (p, j) {
      p.classList.toggle('active', j === si);
      p.style.borderColor = colorWithAlpha(col.text, 0.4);
      p.style.color = j === si ? col.text : '#6b5c3e';
      p.style.background = j === si ? colorWithAlpha(col.text, 0.15) : 'transparent';
    });
    pillMobiName.textContent = scheme().name;
    pillMobiName.style.color = col.text;
    document.querySelectorAll('.pill-nav').forEach(function (el) {
      el.style.borderColor = colorWithAlpha(col.text, 0.4);
      el.style.color = col.text;
    });
    pillMobiName.style.borderColor = colorWithAlpha(col.text, 0.4);
  }
  function updateScan(col) {
    if (col.scan) {
      scanEl.style.display = 'block';
      var n = col.scan.px;
      scanEl.style.background = 'repeating-linear-gradient(to bottom,transparent,transparent ' + n + 'px,rgba(' + col.scan.rgb + ',' + col.scan.op + ') ' + n + 'px,rgba(' + col.scan.rgb + ',' + col.scan.op + ') calc(' + n + 'px + 1px))';
    } else {
      scanEl.style.display = 'none';
    }
  }
  document.getElementById('pillPrev').addEventListener('click', function () { setSch(si - 1); });
  document.getElementById('pillNext').addEventListener('click', function () { setSch(si + 1); });
  pillMobiName.addEventListener('click', function () { setSch(si + 1); });

  var soundOn = localStorage.getItem('vektor-v4-sound') !== '0';
  var st = document.getElementById('soundToggle');
  function syncS() {
    st.textContent = soundOn ? 'Sound on' : 'Sound off';
    st.setAttribute('aria-pressed', soundOn ? 'true' : 'false');
  }
  syncS();

  var actx = null;
  var iosUnlockUrl = null;
  var iosLikeAudio =
    /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  var safariAudio =
    iosLikeAudio ||
    (/Safari/i.test(navigator.userAgent) &&
      !/Chrome|CriOS|Chromium|Edg|OPR|Android|FxiOS/i.test(navigator.userAgent));
  function buildSilentWavBlob() {
    var sampleRate = 44100;
    var numSamples = Math.floor(sampleRate * 0.06);
    var dataSize = numSamples * 2;
    var buffer = new ArrayBuffer(44 + dataSize);
    var v = new DataView(buffer);
    var p = 0;
    function writeStr(s) {
      for (var i = 0; i < s.length; i++) v.setUint8(p++, s.charCodeAt(i));
    }
    writeStr('RIFF');
    v.setUint32(p, 36 + dataSize, true); p += 4;
    writeStr('WAVE');
    writeStr('fmt ');
    v.setUint32(p, 16, true); p += 4;
    v.setUint16(p, 1, true); p += 2;
    v.setUint16(p, 1, true); p += 2;
    v.setUint32(p, sampleRate, true); p += 4;
    v.setUint32(p, sampleRate * 2, true); p += 4;
    v.setUint16(p, 2, true); p += 2;
    v.setUint16(p, 16, true); p += 2;
    writeStr('data');
    v.setUint32(p, dataSize, true); p += 4;
    for (var j = 0; j < numSamples; j++) {
      v.setInt16(p + j * 2, j < 3 ? 180 : 0, true);
    }
    return new Blob([buffer], { type: 'audio/wav' });
  }
  function unlockHtmlAudioFromGesture() {
    var el = document.getElementById('iosAudioGate');
    if (!el || el.dataset.primed === '1') return;
    try {
      if (!iosUnlockUrl) iosUnlockUrl = URL.createObjectURL(buildSilentWavBlob());
      el.src = iosUnlockUrl;
      el.volume = 0.12;
      var pl = el.play();
      if (pl && typeof pl.then === 'function') {
        pl.then(function () { el.dataset.primed = '1'; }).catch(function () {});
      } else {
        el.dataset.primed = '1';
      }
    } catch (e) {}
  }
  function ensureMasterGain(a) {
    if (!a._vMaster) {
      var g = a.createGain();
      g.gain.value = 0.9;
      g.connect(a.destination);
      a._vMaster = g;
    }
    return a._vMaster;
  }
  function getA() {
    if (!actx) {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      if (iosLikeAudio) {
        actx = new Ctx();
      } else {
        try {
          actx = new Ctx({ latencyHint: 'interactive' });
        } catch (e) {
          actx = new Ctx();
        }
      }
      ensureMasterGain(actx);
    } else if (!actx._vMaster) {
      ensureMasterGain(actx);
    }
    return actx;
  }
  function playSilentPrime(a) {
    try {
      ensureMasterGain(a);
      var sr = a.sampleRate || 44100;
      var frames = Math.max(256, Math.floor(sr * 0.04));
      var buf = a.createBuffer(1, frames, sr);
      var s = a.createBufferSource();
      s.buffer = buf;
      var g = a.createGain();
      g.gain.value = 0.0001;
      s.connect(g);
      g.connect(a._vMaster);
      s.start(0);
    } catch (e) {}
  }
  function primeAudioFromGesture() {
    if (!soundOn) return;
    try {
      var a = getA();
      void a.resume();
    } catch (e) {}
    unlockHtmlAudioFromGesture();
    try {
      var a2 = getA();
      var after = function () { playSilentPrime(a2); };
      if (a2.state === 'suspended') {
        a2.resume().then(after).catch(after);
      } else {
        after();
      }
    } catch (e) {}
  }
  function unlock() {
    primeAudioFromGesture();
  }
  document.addEventListener('touchstart', function () { primeAudioFromGesture(); }, { capture: true, passive: true });
  document.addEventListener('touchend', function () { primeAudioFromGesture(); }, { capture: true, passive: true });
  document.addEventListener('pointerdown', function () { primeAudioFromGesture(); }, { capture: true, passive: true });
  document.addEventListener('mousedown', function () { primeAudioFromGesture(); }, { capture: true, passive: true });
  document.addEventListener('keydown', function () { primeAudioFromGesture(); }, { capture: true, passive: true });
  document.addEventListener('visibilitychange', function () {
    var el = document.getElementById('iosAudioGate');
    if (document.hidden) {
      if (el) el.dataset.primed = '0';
    } else {
      if (soundOn) {
        primeAudioFromGesture();
        if (actx && actx.state === 'suspended') void actx.resume();
      }
    }
  });
  window.addEventListener('pageshow', function () {
    if (soundOn) primeAudioFromGesture();
  });
  window.addEventListener('focus', function () {
    if (soundOn && actx && actx.state === 'suspended') void actx.resume();
  });
  document.addEventListener('click', function () {
    if (soundOn && actx) {
      try { void actx.resume(); } catch (e) {}
    }
  }, true);
  document.body.addEventListener('touchstart', function () { primeAudioFromGesture(); }, { capture: true, passive: false });
  var canvasWrapEl = document.getElementById('canvasWrap');
  if (canvasWrapEl) {
    canvasWrapEl.addEventListener('touchstart', function () { primeAudioFromGesture(); }, { capture: true, passive: false });
  }

  function mapWaveForBuffer(t) {
    if (safariAudio || isTouch) {
      if (t === 'square' || t === 'sawtooth') return 'sine';
    }
    return t;
  }

  var beepBufCache = Object.create(null);
  function makeBeepBuffer(a, f, waveType, d, v) {
    var sr = a.sampleRate;
    var tail = 0.048;
    var n = Math.max(128, Math.floor(sr * (Math.max(d, 0.02) + tail)));
    var buf = a.createBuffer(1, n, sr);
    var ch = buf.getChannelData(0);
    var oscPhase = 0;
    var dPhase = (2 * Math.PI * f) / sr;
    var volBoost = isTouch || iosLikeAudio ? 1.45 : 1;
    var amp = Math.min(0.95, Math.max(v, 0.0001) * volBoost);
    for (var i = 0; i < n; i++) {
      var tSec = i / sr;
      var atk = Math.min(1, tSec / 0.005);
      var dec = tSec < d ? 1 : Math.max(0, 1 - (tSec - d) / tail);
      var env = atk * dec;
      var w;
      if (waveType === 'square') {
        w = Math.sin(oscPhase) >= 0 ? 0.75 : -0.75;
      } else if (waveType === 'sawtooth') {
        var cyc = (oscPhase / (2 * Math.PI)) % 1;
        w = 2 * cyc - 1;
      } else {
        w = Math.sin(oscPhase);
      }
      ch[i] = w * amp * env;
      oscPhase += dPhase;
      if (oscPhase > Math.PI * 2000) oscPhase -= Math.PI * 2000;
    }
    return buf;
  }

  st.addEventListener('pointerdown', function (e) {
    if (e.pointerType === 'touch' || e.pointerType === 'pen') primeAudioFromGesture();
  }, { passive: true });
  st.addEventListener('click', function () {
    soundOn = !soundOn;
    localStorage.setItem('vektor-v4-sound', soundOn ? '1' : '0');

    var play = function () {

    ctx.closePath();
    ctx.stroke();

  function tick(now) {
    requestAnimationFrame(tick);
    var dt = lastTick ? Math.min(64, now - lastTick) : FRAME_MS;
    lastTick = now;
    var f = dt / FRAME_MS;
    var col = resolve(now);
    syncChromeColors(col);

    if (phase === 'idle') {
      if (col.disco) {
        pillMobiName.style.color = col.text;
        pillsEl.querySelectorAll('.pill').forEach(function (p, j) {
          p.style.color = j === si ? col.text : '#6b5c3e';
        });
      }
      drawIdle(now);
      return;
    }

    ctx.fillStyle = col.bg;
    ctx.fillRect(0, 0, W, H);
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    if (phase === 'gameover') {
      ctx.fillStyle = col.text;
      ctx.textAlign = 'center';
      ctx.font = '24px Georgia, serif';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 20);
      ctx.font = '14px system-ui, sans-serif';
      ctx.fillText('SCORE ' + score, W / 2, H / 2 + 10);
      ctx.fillStyle = '#6b5c3e';
      ctx.fillText(isTouch ? 'TAP TO PLAY AGAIN' : 'CLICK TO CONTINUE', W / 2, H / 2 + 44);
      ctx.textAlign = 'left';
      return;
    }

    if (!paused) {
      if (shipBreakup > 0) {
        ship.x = W / 2;
        ship.y = H / 2;
        ship.vx = ship.vy = 0;
        ship.ang = -Math.PI / 2;
        shipBreakup -= f;
        if (shipBreakup <= 0) {
          shipBreakup = 0;
          ship.inv = INV_RESPAWN_FRAMES;
        }
      } else {
        var rotSp = 0.065 * f;
        if (rotL) ship.ang -= rotSp;
        if (rotR) ship.ang += rotSp;
        if (thrust) {
          var acc = 0.14 * f;
          ship.vx += Math.cos(ship.ang) * acc;
          ship.vy += Math.sin(ship.ang) * acc;
        }
        ship.vx *= Math.pow(0.992, f);
        ship.vy *= Math.pow(0.992, f);
        ship.x += ship.vx * f;
        ship.y += ship.vy * f;
        wrap(ship);
        if (ship.inv > 0) ship.inv -= f;
      }
      if (bCooldown > 0) bCooldown -= f;

      var swarm = rockMass() < D().swarmThreshold ? 1.6 : 1;

      for (var hi = hunters.length - 1; hi >= 0; hi--) {
        var h = hunters[hi];
        var td = toroidalDelta(h.x, h.y, ship.x, ship.y);
        var want = Math.atan2(td.dy, td.dx);
        var turn = D().huntTurnRate * swarm * f;
        var da = want - h.ang;
        while (da > Math.PI) da -= Math.PI * 2;
        while (da < -Math.PI) da += Math.PI * 2;
        h.ang += Math.sign(da) * Math.min(Math.abs(da), turn);
        var sp = 2.2 * D().asteroidSpeedMult;
        h.vx = Math.cos(h.ang) * sp;
        h.vy = Math.sin(h.ang) * sp;
        h.x += h.vx * f;
        h.y += h.vy * f;
        wrap(h);
        if (distToroidal(h, ship) < h.r + 10 && ship.inv <= 0 && shipBreakup <= 0) {
          hitShip();
        }
      }

      for (var ri = rocks.length - 1; ri >= 0; ri--) {
        var rk = rocks[ri];
        rk.x += rk.vx * f;
        rk.y += rk.vy * f;
        rk.rot += rk.vr * f;
        wrap(rk);
        if (distToroidal(rk, ship) < rk.r + 8 && ship.inv <= 0 && shipBreakup <= 0) {
          hitShip();
        }
      }

      for (var bi = bullets.length - 1; bi >= 0; bi--) {
        var b = bullets[bi];
        b.x += b.vx * f;
        b.y += b.vy * f;
        wrap(b);
        b.life -= f;
        if (b.life <= 0) {
          bullets.splice(bi, 1);
          continue;
        }
        var hit = false;
        for (var rj = rocks.length - 1; rj >= 0; rj--) {
          var R = rocks[rj];
          if (distToroidal(b, R) < R.r + 4) {
            splitRock(R, col);
            hit = true;
            break;
          }
        }
        if (!hit) {
          for (var hj = hunters.length - 1; hj >= 0; hj--) {
            var Hn = hunters[hj];
            if (distToroidal(b, Hn) < Hn.r + 4) {
              score += 200;
              explode(Hn.x, Hn.y, col.ship, 12);
              hunters.splice(hj, 1);
              hit = true;
              beep(400, 'square', 0.1, 0.12);
              break;
            }
          }
        }
        if (hit) bullets.splice(bi, 1);
      }

      if (rocks.length === 0 && hunters.length === 0) {
        waveCleared();
      }
    }

    for (var pi = parts.length - 1; pi >= 0; pi--) {
      var pt = parts[pi];
      pt.x += pt.vx * f;
      pt.y += pt.vy * f;
      pt.life -= f;
      if (pt.life <= 0) parts.splice(pi, 1);
    }

    rocks.forEach(function (r) { drawRock(r, col); });
    hunters.forEach(function (h) {
      ctx.save();
      ctx.translate(h.x, h.y);
      ctx.rotate(h.ang);
      ctx.strokeStyle = col.ship;
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.moveTo(12, 0);
      ctx.lineTo(0, 9);
      ctx.lineTo(-12, 0);
      ctx.lineTo(0, -9);
      ctx.closePath();
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    });

    bullets.forEach(function (b) {
      ctx.fillStyle = col.bullet;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
      ctx.fill();
    });

    parts.forEach(function (pt) {
      ctx.globalAlpha = Math.min(1, pt.life / 20);
      ctx.fillStyle = pt.col;
      ctx.fillRect(pt.x, pt.y, 3, 3);
      ctx.globalAlpha = 1;
    });

    if (shipBreakup <= 0) {
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(ship.ang);
      if (ship.inv > 0) {
        ctx.globalAlpha = Math.floor(ship.inv / 3) % 2 ? 1 : 0.22;
      }
      ctx.strokeStyle = col.ship;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(18, 0);
      ctx.lineTo(-14, 12);
      ctx.lineTo(-6, 0);
      ctx.lineTo(-14, -12);
      ctx.closePath();
      ctx.stroke();
      if (thrust && !paused && ship.inv <= 0) {
        ctx.strokeStyle = 'rgba(255,180,80,0.7)';
        ctx.beginPath();
        ctx.moveTo(-14, 0);
        ctx.lineTo(-26, 0);
        ctx.stroke();
      }
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    ctx.fillStyle = col.text;
    ctx.font = '22px Georgia, serif';
    ctx.textAlign = 'left';
    ctx.fillText(String(score), 16, 32);
    ctx.font = '12px system-ui, sans-serif';
    ctx.fillStyle = '#6b5c3e';
    ctx.fillText('WAVE ' + wave, 16, 52);
    ctx.fillText('♥'.repeat(Math.max(0, lives)), 16, 70);

    ctx.fillStyle = '#3a3025';
    ctx.font = '9px system-ui, sans-serif';
    ctx.letterSpacing = '0.15em';
    ctx.textAlign = 'right';
    ctx.fillText(diffKey, W - 16, H - 24);
    ctx.letterSpacing = '0';
    ctx.textAlign = 'left';

    if (bonusFlash && bonusFlash.t > 0) {
      ctx.globalAlpha = bonusFlash.t / 60;
      ctx.fillStyle = col.text;
      ctx.font = '16px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('+' + bonusFlash.amt, W / 2, 88);
      ctx.textAlign = 'left';
      ctx.globalAlpha = 1;
      bonusFlash.t -= f;
      if (bonusFlash.t <= 0) bonusFlash = null;
    }

    if (paused) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = col.text;
      ctx.textAlign = 'center';
      ctx.font = '18px Georgia, serif';
      ctx.fillText('PAUSED', W / 2, H / 2);
      ctx.textAlign = 'left';
    }
  }

  setSch(0);
  requestAnimationFrame(tick);
})();
  </script>
</body>
